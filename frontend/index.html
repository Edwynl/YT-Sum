<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Summarizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #7c6aff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --text-muted: #666680;
    --text-dim: #3a3a55;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.01) 2px,
      rgba(0,0,0,0.01) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }

  .header-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
  }

  .header-title span { color: var(--accent); }

  .header-tag {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .input-zone {
    padding: 32px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .input-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-label::before {
    content: '>';
    color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 18px;
    outline: none;
    border-radius: 2px;
  }

  .url-input:focus {
    border-color: var(--accent);
  }

  .model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 14px;
    outline: none;
    border-radius: 2px;
    min-width: 140px;
  }

  .btn-summarize {
    background: var(--accent);
    color: white;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 0 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-summarize:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-bar {
    padding: 8px 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--accent3); }
  .status-dot.error { background: var(--accent2); }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

  .main-layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .panel-actions { margin-left: auto; display: flex; gap: 6px; }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: thin;
  }

  .summary-content {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .summary-content .h2 { color: var(--accent); font-weight: 700; margin: 20px 0 8px; display: block; }
  .summary-content .h2:first-child { margin-top: 0; }

  .cursor-blink {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .transcript-panel { display: flex; flex-direction: column; overflow: hidden; }
  .search-row { padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; background: transparent; border: none; color: var(--text); font-family: var(--mono); outline: none; }

  .transcript-body { flex: 1; overflow-y: auto; scrollbar-width: thin; }

  .subtitle-card {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(42,42,56,0.3);
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 12px;
  }

  .subtitle-time { font-size: 10px; color: var(--accent); }
  .subtitle-en { font-size: 12px; color: var(--text); margin-bottom: 4px; }
  .subtitle-zh { font-size: 12px; color: var(--text-muted); transition: color 0.3s; }
  .subtitle-zh.translating { color: var(--text-dim); font-style: italic; }

  /* 滚动条优化 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">▶</div>
  <div class="header-title">YT<span>Sum</span></div>
  <div class="header-tag">Parallel AI · Ollama</div>
</header>

<div class="input-zone">
  <div class="input-label">YouTube URL</div>
  <div class="input-row">
    <input class="url-input" id="urlInput" type="text" placeholder="粘贴链接后按回车..." autocomplete="off">
    <select class="model-select" id="modelSelect"></select>
    <button class="btn-summarize" id="btnSummarize" onclick="startSummarize()">▶ 一键总结</button>
    <button class="btn-summarize" id="btnStop" onclick="stopSummarize()" style="display:none; background: var(--accent2); margin-left: 8px;">■ 停止</button>
  </div>
  <div class="input-row" style="margin-top:8px; border-top: 1px solid var(--border); padding-top:8px">
    <div style="font-size:11px; color:var(--text-dim); display:flex; align-items:center;">
      <span>代理(可选):</span>
      <input id="proxyInput" type="text" placeholder="http://127.0.0.1:7890" style="background:transparent; border:none; color:var(--accent2); font-size:11px; width:200px; margin-left:4px; outline:none">
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">就绪</span>
</div>

<div class="main-layout">
  <div class="panel">
    <div class="panel-header"><span>◈</span> AI 总结 <div class="panel-actions"><button class="btn-sm" onclick="copyResult()">复制</button></div></div>
    <div class="panel-body" id="summaryPanel"></div>
  </div>
  <div class="transcript-panel">
    <div class="panel-header"><span>≡</span> 字幕流 (实时翻译) <span id="subtitleCount" style="margin-left:auto; opacity:0.5"></span></div>
    <div class="search-row"><input class="search-input" id="searchInput" placeholder="/ 搜索关键词..." oninput="filterTranscript(this.value)"></div>
    <div class="transcript-body" id="transcriptPanel"></div>
  </div>
</div>

<script>
let transcriptData = [];
let fullSummary = "";
let currentReader = null;
let isStopping = false;

function setStatus(text, mode = 'ready') {
  document.getElementById('statusText').innerText = text;
  document.getElementById('statusDot').className = 'status-dot ' + mode;
}

async function loadModels() {
  const select = document.getElementById('modelSelect');
  try {
    const res = await fetch('/models?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      select.innerHTML = data.models.map(m => `<option value="${m}">${m.includes('3b')?'⚡ ':''}${m}</option>`).join('');
      for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value.includes('9b')) { select.selectedIndex = i; break; }
      }
    }
  } catch (e) {}
}
loadModels();

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderSummary(text) {
  const html = text.split('\n').map(line => {
    if (line.startsWith('## ')) return `<span class="h2">${escapeHtml(line.slice(3))}</span>`;
    return escapeHtml(line).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '\n';
  }).join('');
  document.getElementById('summaryPanel').innerHTML = `<div class="summary-content">${html}<span class="cursor-blink"></span></div>`;
}

function initTranscript(data) {
  transcriptData = data.map(t => ({...t, translation: ''}));
  renderTranscript();
}

function updateTranscriptChunk(startIdx, translations) {
  translations.forEach((text, i) => {
    if (transcriptData[startIdx + i]) transcriptData[startIdx + i].translation = text;
  });
  renderTranscript();
}

function renderTranscript() {
  const panel = document.getElementById('transcriptPanel');
  panel.innerHTML = transcriptData.map((item, i) => `
    <div class="subtitle-card" id="sub-${i}">
      <div class="subtitle-time">${Math.floor(item.start/60)}:${String(Math.floor(item.start%60)).padStart(2,'0')}</div>
      <div class="subtitle-texts">
        <div class="subtitle-en">${escapeHtml(item.text)}</div>
        <div class="subtitle-zh ${!item.translation?'translating':''}">${escapeHtml(item.translation || '翻译中...')}</div>
      </div>
    </div>
  `).join('');
}

async function startSummarize() {
  const url = document.getElementById('urlInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  const proxy = document.getElementById('proxyInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('btnSummarize');
  const stopBtn = document.getElementById('btnStop');
  btn.disabled = true; stopBtn.style.display = 'inline-block';
  isStopping = false; fullSummary = ""; transcriptData = [];
  
  setStatus('初始化...', 'loading');
  document.getElementById('summaryPanel').innerHTML = '正在拉取视频字幕并启动并行任务...';

  try {
    const response = await fetch('/summarize/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, model, proxy: proxy||null, translate: true, use_cache: true })
    });

    currentReader = response.body.getReader();
    const decoder = new TextDecoder();
    
    while (true) {
      const { value, done } = await currentReader.read();
      if (done || isStopping) break;
      
      const chunk = decoder.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const payload = JSON.parse(line.slice(6));
        
        if (payload.type === 'transcript') {
          initTranscript(payload.data);
          setStatus(payload.cached ? '缓存已命中，秒推结果' : '字幕就绪，并行总结与翻译中...', 'loading');
        } else if (payload.type === 'token') {
          fullSummary += payload.text;
          renderSummary(fullSummary);
        } else if (payload.type === 'transcript_chunk') {
          updateTranscriptChunk(payload.start_idx, payload.data);
        } else if (payload.type === 'done') {
          setStatus('任务完成', 'done');
          renderSummary(fullSummary); // 移除光标
        } else if (payload.type === 'error') {
          throw new Error(payload.message);
        }
      }
    }
  } catch (err) {
    if (!isStopping) setStatus('出错: ' + err.message, 'error');
  } finally {
    btn.disabled = false; stopBtn.style.display = 'none';
  }
}

function stopSummarize() { isStopping = true; if (currentReader) currentReader.cancel(); setStatus('已中止', 'idle'); }

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.stopPropagation();
}, true);

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') startSummarize(); });

function copyResult() { navigator.clipboard.writeText(fullSummary); setStatus('已复制', 'done'); }
</script>
</body>
</html>
