<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Summarizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #7c6aff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --text-muted: #666680;
    --text-dim: #3a3a55;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Scanline overlay - 减弱不必要的视觉干扰 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.01) 2px,
      rgba(0,0,0,0.01) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .header-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .header-title span { color: var(--accent); }

  .header-tag {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Input Zone ── */
  .input-zone {
    padding: 32px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .input-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-label::before {
    content: '>';
    color: var(--accent);
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }

  .url-input::placeholder { color: var(--text-dim); }

  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(124,106,255,0.1);
  }

  .model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 14px;
    outline: none;
    cursor: pointer;
    border-radius: 2px;
    min-width: 140px;
  }

  .btn-summarize {
    background: var(--accent);
    color: white;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 0 28px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-summarize:hover { background: #9181ff; transform: translateY(-1px); }
  .btn-summarize:active { transform: translateY(0); }
  .btn-summarize:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Status Bar ── */
  .status-bar {
    padding: 8px 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .status-dot.loading { background: var(--accent); animation: spin-dot 1s linear infinite; }
  .status-dot.done { background: var(--accent3); }
  .status-dot.error { background: var(--accent2); }

  @keyframes spin-dot {
    0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
  }

  .status-cache {
    margin-left: auto;
    padding: 2px 8px;
    background: rgba(67,233,123,0.1);
    border: 1px solid rgba(67,233,123,0.2);
    color: var(--accent3);
    font-size: 10px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  /* ── Main Layout ── */
  .main-layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  /* ── Summary Panel ── */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .panel-icon {
    font-size: 14px;
    opacity: 0.8;
  }

  .panel-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .btn-sm:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Summary markdown-like rendering */
  .summary-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-ascii {
    font-size: 11px;
    line-height: 1.4;
    text-align: center;
    opacity: 0.4;
  }

  .summary-content {
    font-size: 13px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Style inline markdown elements */
  .summary-content .h2 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin: 20px 0 8px;
    letter-spacing: 0.5px;
    display: block;
  }

  .summary-content .h2:first-child { margin-top: 0; }

  .cursor-blink {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  /* ── Transcript Panel ── */
  .transcript-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .search-row {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    padding: 2px 0;
  }

  .search-input::placeholder { color: var(--text-dim); }

  .transcript-body {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .subtitle-card {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(42,42,56,0.5);
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 12px;
    align-items: start;
    transition: background 0.1s;
  }

  .subtitle-card:hover { background: var(--surface2); }
  .subtitle-card.highlight { background: rgba(124,106,255,0.08); }

  .subtitle-time {
    font-size: 10px;
    color: var(--accent);
    padding-top: 2px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .subtitle-texts { flex: 1; }

  .subtitle-en {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .subtitle-zh {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  mark {
    background: rgba(255,107,107,0.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">▶</div>
  <div class="header-title">YT<span>Sum</span></div>
  <div class="header-tag">Local AI · Ollama</div>
</header>

<div class="input-zone">
  <div class="input-label">YouTube URL</div>
  <div class="input-row">
    <input class="url-input" id="urlInput"
      type="text"
      placeholder="https://www.youtube.com/watch?v=..."
      autocomplete="off"
      spellcheck="false">
    <select class="model-select" id="modelSelect">
      <option value="qwen3.5:9b">qwen3.5:9b (保底)</option>
    </select>
    <button class="btn-sm" style="margin-left:4px; height:auto; padding:0 8px" onclick="loadModels()">🔄 刷新</button>
    <button class="btn-summarize" id="btnSummarize" onclick="startSummarize()">
      ▶ 一键总结
    </button>
  </div>
  <div class="input-row" style="margin-top:8px; border-top: 1px solid var(--border); padding-top:8px">
    <div style="font-size:11px; color:var(--text-dim); display:flex; align-items:center;">
      <span>代理(可选):</span>
      <input id="proxyInput" type="text" placeholder="http://127.0.0.1:7890" 
             style="background:transparent; border:none; color:var(--accent2); font-size:11px; width:200px; margin-left:4px; outline:none">
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">就绪 — 粘贴 YouTube 链接开始</span>
  <span class="status-cache" id="cacheTag" style="display:none">⚡ CACHED</span>
</div>

<div class="main-layout">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">◈</span>
      AI 总结
      <div class="panel-actions">
        <button class="btn-sm" onclick="copyResult()">复制</button>
        <button class="btn-sm" onclick="exportMd()">导出 .md</button>
        <button class="btn-sm" onclick="clearCache()">清除缓存</button>
      </div>
    </div>
    <div class="panel-body" id="summaryPanel">
      <div class="summary-empty" id="summaryEmpty">
        <div class="empty-ascii">┌─────────────────────┐<br>│  等待视频链接输入...  │<br>└─────────────────────┘</div>
        <div style="font-size:11px;color:var(--text-dim)">粘贴链接后点击一键总结</div>
      </div>
    </div>
  </div>

  <div class="transcript-panel">
    <div class="panel-header">
      <span class="panel-icon">≡</span>
      双语字幕
      <div class="panel-actions" style="margin-left:auto">
        <span id="subtitleCount" style="color:var(--text-dim);font-size:10px"></span>
      </div>
    </div>
    <div class="search-row">
      <input class="search-input" id="searchInput"
        placeholder="/ 搜索字幕关键词..."
        oninput="filterTranscript(this.value)">
    </div>
    <div class="transcript-body" id="transcriptPanel">
      <div class="summary-empty">
        <div class="empty-ascii" style="opacity:0.25">─── 字幕将在总结完成后显示 ───</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentVideoId = null;
let transcriptData = [];
let fullTextGenerated = "";

// ── 错误处理辅助 ──
function stringifyError(err) {
  if (!err) return '未知错误';
  if (typeof err === 'string') return err;
  return err.message || JSON.stringify(err);
}

function setStatus(text, mode = 'ready') {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (!dot || !txt) return;
  txt.innerText = stringifyError(text);
  dot.className = 'status-dot ' + mode;
}

// ── 动态模型加载 ──
async function loadModels() {
  const select = document.getElementById('modelSelect');
  try {
    const res = await fetch('/models?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (data && data.models) {
        // 分类模型：快模型和高质量模型
        let options = '';
        data.models.forEach(m => {
          let label = m;
          if (m.includes('3b') || m.includes('1.5b')) label += ' (推荐-极致快)';
          if (m.includes('9b') || m.includes('8b')) label += ' (推荐-质量高)';
          options += `<option value="${m}">${label}</option>`;
        });
        select.innerHTML = options;
        // 默认选中高质量模型
        for (let i = 0; i < select.options.length; i++) {
          if (select.options[i].value.includes('9b')) {
            select.selectedIndex = i; break;
          }
        }
      }
    }
  } catch (e) { console.error(e); }
}
loadModels();

function formatTime(seconds) {
  const s = Math.floor(seconds);
  const m = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  const mm = String(m % 60).padStart(2, '0');
  return `${mm}:${ss}`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSummaryHtml(text) {
  const lines = text.split('\n');
  let html = '<div class="summary-content">';
  for (const line of lines) {
    if (line.startsWith('## ')) {
      html += `<span class="h2">${escapeHtml(line.slice(3))}</span>`;
    } else {
      const formatted = escapeHtml(line).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html += formatted + '\n';
    }
  }
  html += '<span class="cursor-blink"></span></div>';
  return html;
}

function displayTranscript(items) {
  const panel = document.getElementById('transcriptPanel');
  if (!items.length) {
    panel.innerHTML = '<div class="summary-empty">无字幕</div>';
    return;
  }
  panel.innerHTML = items.map(item => `
    <div class="subtitle-card">
      <div class="subtitle-time">${formatTime(item.start)}</div>
      <div class="subtitle-texts">
        <div class="subtitle-en">${escapeHtml(item.text)}</div>
        ${item.translation ? `<div class="subtitle-zh">${escapeHtml(item.translation)}</div>` : ''}
      </div>
    </div>
  `).join('');
  document.getElementById('subtitleCount').textContent = `${items.length} 条`;
}

// ── 核心逻辑：流式总结 ──
async function startSummarize() {
  const url = document.getElementById('urlInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  const proxy = document.getElementById('proxyInput').value.trim();
  
  if (!url) return alert('请输入 URL');
  
  const btn = document.getElementById('btnSummarize');
  btn.disabled = true;
  setStatus('正在处理字幕...', 'loading');
  
  const summaryPanel = document.getElementById('summaryPanel');
  summaryPanel.innerHTML = '<div class="summary-content">正在初始化连接...</div>';
  
  fullTextGenerated = "";

  try {
    const response = await fetch('/summarize/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, model, proxy: proxy || null, translate: true, use_cache: true })
    });

    if (!response.ok) throw new Error('网络请求失败');

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const payload = JSON.parse(line.slice(6));
          if (payload.type === 'transcript') {
            transcriptData = payload.data;
            displayTranscript(transcriptData);
            setStatus('字幕就绪，正在生成总结...', 'loading');
          } else if (payload.type === 'token') {
            fullTextGenerated += payload.text;
            summaryPanel.innerHTML = renderSummaryHtml(fullTextGenerated);
          } else if (payload.type === 'done') {
            currentVideoId = payload.video_id;
            // 移除光标
            summaryPanel.innerHTML = renderSummaryHtml(fullTextGenerated).replace('<span class="cursor-blink"></span>', '');
            setStatus('总结完成', 'done');
          } else if (payload.type === 'error') {
            throw new Error(payload.message);
          }
        } catch (e) {
          console.error('Parse error:', e, line);
        }
      }
    }
  } catch (err) {
    const msg = stringifyError(err);
    setStatus('出错: ' + msg, 'error');
    summaryPanel.innerHTML = `<div class="summary-content" style="color:var(--accent2)">❌ 错误: ${msg}</div>`;
  } finally {
    btn.disabled = false;
  }
}

// ── 修复按键干扰 UI 变色问题 ──
function blockKeys(e) {
  // 拦截左右方向键，防止其冒泡到外部容器（如某些 IDE 插件拦截这些按键会导致界面变色）
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.stopPropagation();
    // 注意：不要在 input 内部 preventDefault，否则光标移动会失效
    // 仅 stopPropagation 理论上可以阻止外层捕获
  }
}

document.getElementById('urlInput').addEventListener('keydown', blockKeys);
document.getElementById('proxyInput').addEventListener('keydown', blockKeys);

// 全局拦截测试（如果是在 IDE 插件内，可以尝试在捕获阶段拦截）
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    // 仅当焦点在输入框时增强拦截
    if (document.activeElement.tagName === 'INPUT') {
      e.stopPropagation();
    }
  }
}, true);

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSummarize();
});

function copyResult() {
  if (!fullTextGenerated) return;
  navigator.clipboard.writeText(fullTextGenerated).then(() => setStatus('已复制 ✓', 'done'));
}
</script>
</body>
</html>
